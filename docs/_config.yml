theme: jekyll-theme-minimal
title: TerminalOS
description: Modular Terminal CLI Framework for Python
logo: https://github.com/NatBuilds/TerminalOS/blob/master/Logos/MainImage.png
show_downloads: true
github:
  repository_url: https://github.com/NatBuilds/TerminalOS
  is_project_page: false

# Navigation
nav_links:
  - name: Home
    url: /
  - name: Quick Start
    url: /pages/quick-start.html
  - name: Architecture
    url: /pages/architecture.html
  - name: API Reference
    url: /pages/api-reference.html
  - name: Development
    url: /pages/development.html
  - name: GitHub
    url: https://github.com/NatBuilds/TerminalOS

markdown: kramdown
kramdown:
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    default_lang: python
    span:
      line_numbers: false
    block:
      line_numbers: false

plugins:
  - jekyll-sitemap
  - jekyll-seo-tag

